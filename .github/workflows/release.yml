name: Release gem

on:
  push:
    tags:
      - "v*"

jobs:
  push:
    name: Push gem to RubyGems.org
    runs-on: ubuntu-latest

    # Must match the environment set on the RubyGems trusted publisher.
    # Remove this line if you did not configure an environment there.
    environment: release

    permissions:
      id-token: write # required for trusted publishing (OIDC)
      contents: write # lets the action create the GitHub release

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: ruby
      - uses: rubygems/release-gem@v1
